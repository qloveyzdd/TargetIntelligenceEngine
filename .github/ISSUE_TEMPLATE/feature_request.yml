name: Feature Request
description: 提出一个新功能或改进想法
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 先说清楚痛点，不要直接只写方案
      placeholder: 例如：现在证据阶段耗时过长，难以在真实模型下稳定跑通
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 可以写你的思路或期望行为
      placeholder: 例如：把证据提取改成按候选聚合，再做批量抽取
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果你想过其他方案，也可以写在这里
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 例如使用场景、参考项目、约束条件
